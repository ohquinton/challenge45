services:
  - type: web
    name: challenge45
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: challenge45-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
